<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff7ed;color:#111827;min-height:100vh}
.header{background:linear-gradient(135deg,#ff4d00,#FF7810);padding:32px 40px;border-radius:0 0 20px 20px}
.header h1{font-size:28px;font-weight:700;color:#fff}
.header p{color:rgba(255,255,255,.9);font-size:14px;margin-top:4px}
.container{max-width:1400px;margin:0 auto;padding:24px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.kpi{background:#fff;border-radius:14px;padding:20px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#ea580c;margin-bottom:6px;font-weight:600}
.kpi .value{font-size:26px;font-weight:700;color:#111827}
.kpi .delta{font-size:12px;margin-top:4px}
.kpi .delta.up{color:#16a34a}.kpi .delta.down{color:#dc2626}
.card{background:#fff;border-radius:14px;padding:24px;margin-bottom:24px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card h3{font-size:16px;font-weight:600;color:#111827;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.funnel-bar{display:flex;align-items:center;margin-bottom:10px}
.funnel-bar .step-name{width:130px;font-size:12px;color:#6b7280;text-align:right;padding-right:12px}
.funnel-bar .bar-wrap{flex:1;height:32px;background:#f3f4f6;border-radius:6px;overflow:hidden;position:relative}
.funnel-bar .bar-fill{height:100%;border-radius:6px;transition:width .6s ease}
.funnel-bar .bar-text{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid #ff4d00;color:#ea580c;font-weight:600;font-size:11px;text-transform:uppercase}
td{padding:9px 12px;border-bottom:1px solid #f3f4f6;color:#374151}
tr:hover td{background:rgba(255,120,16,.04)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-high{background:rgba(34,197,94,.1);color:#16a34a}
.tag-med{background:rgba(249,115,22,.1);color:#ea580c}
.tag-low{background:rgba(239,68,68,.1);color:#dc2626}
canvas{max-height:320px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
</style>
</head>

// ── HELPERS ──
var U = window.SPEAKX.Utils;
var FD = window.SPEAKX.FilterData;
var charts = {};

// ── RENDER DASHBOARD (called on init and on filter change) ──
function renderDashboard(filters) {
  // Apply filters
  var daily = FD.byDateRange(EMBEDDED_dailyFunnel, 'dt', filters.dateRange);
  var channels = filters.channel === 'all' ? EMBEDDED_channelFunnel : EMBEDDED_channelFunnel.filter(function(r) { return r.channel_group === filters.channel; });
  var campaigns = filters.channel === 'all' ? EMBEDDED_campaignData : EMBEDDED_campaignData.filter(function(r) { return r.channel_group === filters.channel; });
  var weekly = EMBEDDED_weeklyFunnel; // weekly data doesn't need daily filtering

  if (daily.length === 0) {
    document.getElementById('app').textContent = 'No data for the selected date range.';
    return;
  }

  // Destroy existing charts
  Object.keys(charts).forEach(function(k) { charts[k] = U.destroyChart(charts[k]); });

  // Aggregations
  var t = daily.reduce(function(a,r) { for(var k in r) { if(k !== 'dt') a[k] = (a[k]||0) + r[k]; } return a; }, {});
  var last7 = daily.slice(-7).reduce(function(a,r) { for(var k in r) { if(k !== 'dt') a[k] = (a[k]||0) + r[k]; } return a; }, {});
  var prev7 = daily.slice(-14,-7).reduce(function(a,r) { for(var k in r) { if(k !== 'dt') a[k] = (a[k]||0) + r[k]; } return a; }, {});

  function delta(k) {
    var c = last7[k]||0, p = prev7[k]||0;
    if (!p) return {v:0,cl:''};
    var ch = ((c-p)/p*100).toFixed(1);
    return {v:ch, cl:ch>=0?'up':'down'};
  }
  var cvrL = last7.installs ? (last7.payments/last7.installs*100).toFixed(2) : 0;
  var cvrP = prev7.installs ? (prev7.payments/prev7.installs*100).toFixed(2) : 0;
  var cvrD = cvrP > 0 ? ((cvrL-cvrP)/cvrP*100).toFixed(1) : 0;
  var cancelL = last7.payments ? (last7.d0_cancellations/last7.payments*100).toFixed(1) : 0;

  // Build DOM safely
  var app = document.getElementById('app');
  app.textContent = '';

  // ── KPIs ──
  var kpiRow = document.createElement('div');
  kpiRow.className = 'kpi-row';
  var kpis = [
    {label:'7-Day Installs',value:U.fN(last7.installs||0),d:delta('installs')},
    {label:'7-Day Payments',value:U.fN(last7.payments||0),d:delta('payments')},
    {label:'7-Day CVR',value:cvrL+'%',d:{v:cvrD,cl:cvrD>=0?'up':'down'}},
    {label:'D0 Cancel Rate',value:cancelL+'%',d:{v:'',cl:''}},
    {label:'Period Installs',value:U.fN(t.installs||0),d:{v:'',cl:''}},
    {label:'Period Payments',value:U.fN(t.payments||0),d:{v:'',cl:''}},
    {label:'Period CVR',value:U.pct(t.payments,t.installs)+'%',d:{v:'',cl:''}},
    {label:'OB Completion',value:U.pct(t.ob_completed,t.fs_shown)+'%',d:{v:'',cl:''}}
  ];
  kpis.forEach(function(k) {
    var div = document.createElement('div');
    div.className = 'kpi';
    var lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = k.label;
    var val = document.createElement('div');
    val.className = 'value';
    val.textContent = k.value;
    div.appendChild(lbl);
    div.appendChild(val);
    if (k.d && k.d.v) {
      var delt = document.createElement('div');
      delt.className = 'delta ' + k.d.cl;
      delt.textContent = (k.d.cl === 'up' ? '\u25B2' : '\u25BC') + ' ' + Math.abs(k.d.v) + '% WoW';
      div.appendChild(delt);
    }
    kpiRow.appendChild(div);
  });
  app.appendChild(kpiRow);

  // ── FUNNEL WATERFALL ──
  var funnelCard = document.createElement('div');
  funnelCard.className = 'card';
  var funnelTitle = document.createElement('h3');
  funnelTitle.textContent = 'Aggregate Funnel (' + daily.length + ' days)';
  funnelCard.appendChild(funnelTitle);

  var steps = [
    {name:'Installs',val:t.installs,color:'#ff4d00'},
    {name:'First Screen',val:t.fs_shown,color:'#FF7810'},
    {name:'OB Completed',val:t.ob_completed,color:'#f97316'},
    {name:'Login',val:t.login_users,color:'#0ea5e9'},
    {name:'Checkout Load',val:t.checkout_load,color:'#22c55e'},
    {name:'Order Created',val:t.order_created,color:'#fbbf24'},
    {name:'Payment',val:t.payments,color:'#ea580c'}
  ];
  steps.forEach(function(s) {
    var w = (s.val / t.installs * 100).toFixed(1);
    var bar = document.createElement('div');
    bar.className = 'funnel-bar';

    var stepName = document.createElement('div');
    stepName.className = 'step-name';
    stepName.textContent = s.name;

    var barWrap = document.createElement('div');
    barWrap.className = 'bar-wrap';

    var barFill = document.createElement('div');
    barFill.className = 'bar-fill';
    barFill.style.width = w + '%';
    barFill.style.background = s.color;

    var barText = document.createElement('div');
    barText.className = 'bar-text';
    barText.textContent = U.fN(s.val) + ' (' + U.pct(s.val, t.installs) + '%)';

    barWrap.appendChild(barFill);
    barWrap.appendChild(barText);
    bar.appendChild(stepName);
    bar.appendChild(barWrap);
    funnelCard.appendChild(bar);
  });
  app.appendChild(funnelCard);

  // ── CHARTS ROW 1: Daily Install + Payment, Weekly CVR ──
  var grid1 = document.createElement('div');
  grid1.className = 'grid-2';
  var card1 = document.createElement('div');
  card1.className = 'card';
  var h3a = document.createElement('h3');
  h3a.textContent = 'Daily Installs & Payments';
  var cvs1 = document.createElement('canvas');
  cvs1.id = 'cDaily';
  card1.appendChild(h3a);
  card1.appendChild(cvs1);

  var card2 = document.createElement('div');
  card2.className = 'card';
  var h3b = document.createElement('h3');
  h3b.textContent = 'Weekly CVR Trend';
  var cvs2 = document.createElement('canvas');
  cvs2.id = 'cWeekly';
  card2.appendChild(h3b);
  card2.appendChild(cvs2);

  grid1.appendChild(card1);
  grid1.appendChild(card2);
  app.appendChild(grid1);

  charts.daily = new Chart(cvs1, {type:'line',data:{
    labels:daily.map(function(r){return U.shortDate(r.dt)}),
    datasets:[
      {label:'Installs',data:daily.map(function(r){return r.installs}),borderColor:'#ff4d00',backgroundColor:'rgba(255,77,0,.08)',fill:true,tension:.3,yAxisID:'y'},
      {label:'Payments',data:daily.map(function(r){return r.payments}),borderColor:'#ea580c',backgroundColor:'rgba(234,88,12,.08)',fill:true,tension:.3,yAxisID:'y1'}
    ]},options:{responsive:true,interaction:{mode:'index',intersect:false},scales:{y:{position:'left',grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return U.fN(v)}}},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#ea580c'}},x:{ticks:{color:'#6b7280',maxRotation:45,autoSkip:true,maxTicksLimit:15}}},plugins:{legend:{labels:{color:'#374151'}}}}});

  charts.weekly = new Chart(cvs2, {type:'bar',data:{
    labels:weekly.map(function(r){return U.shortDate(r.week_start)}),
    datasets:[
      {label:'CVR %',data:weekly.map(function(r){return r.cvr}),backgroundColor:'rgba(255,77,0,.7)',yAxisID:'y'},
      {label:'Installs',data:weekly.map(function(r){return r.installs}),type:'line',borderColor:'#0ea5e9',pointBackgroundColor:'#0ea5e9',tension:.3,yAxisID:'y1'}
    ]},options:{responsive:true,interaction:{mode:'index',intersect:false},scales:{y:{position:'left',grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return v+'%'}},min:0,max:10},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#0ea5e9',callback:function(v){return U.fN(v)}}},x:{ticks:{color:'#6b7280'}}},plugins:{legend:{labels:{color:'#374151'}}}}});

  // ── CHARTS ROW 2: Channel CVR, Daily CVR ──
  var grid2 = document.createElement('div');
  grid2.className = 'grid-2';
  var card3 = document.createElement('div');
  card3.className = 'card';
  var h3c = document.createElement('h3');
  h3c.textContent = 'CVR by Channel';
  var cvs3 = document.createElement('canvas');
  cvs3.id = 'cChannel';
  card3.appendChild(h3c);
  card3.appendChild(cvs3);

  var card4 = document.createElement('div');
  card4.className = 'card';
  var h3d = document.createElement('h3');
  h3d.textContent = 'Daily Overall CVR %';
  var cvs4 = document.createElement('canvas');
  cvs4.id = 'cCVR';
  card4.appendChild(h3d);
  card4.appendChild(cvs4);

  grid2.appendChild(card3);
  grid2.appendChild(card4);
  app.appendChild(grid2);

  var chTop = channels.filter(function(r) { return r.installs > 1000; });
  charts.channel = new Chart(cvs3, {type:'bar',data:{
    labels:chTop.map(function(r){return r.channel_group}),
    datasets:[{label:'CVR %',data:chTop.map(function(r){return r.cvr}),backgroundColor:['#ff4d00','#FF7810','#f97316','#fbbf24','#6b7280','#3b82f6','#22c55e','#0ea5e9','#ef4444']}]
  },options:{indexAxis:'horizontal',responsive:true,scales:{y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#374151'}},x:{ticks:{color:'#6b7280',callback:function(v){return v+'%'}}}},plugins:{legend:{display:false}}}});

  // Daily CVR from computed data
  var dailyCVR = daily.map(function(r) {
    return {
      dt: r.dt,
      overall_cvr: r.installs ? +(r.payments / r.installs * 100).toFixed(2) : 0,
      checkout_to_pay: r.checkout_load ? +(r.payments / r.checkout_load * 100).toFixed(2) : 0
    };
  });

  charts.cvr = new Chart(cvs4, {type:'line',data:{
    labels:dailyCVR.map(function(r){return U.shortDate(r.dt)}),
    datasets:[
      {label:'Overall CVR %',data:dailyCVR.map(function(r){return r.overall_cvr}),borderColor:'#ea580c',backgroundColor:'rgba(255,77,0,.08)',fill:true,tension:.35,pointRadius:3},
      {label:'Checkout\u2192Pay %',data:dailyCVR.map(function(r){return r.checkout_to_pay}),borderColor:'#22c55e',tension:.35,pointRadius:2}
    ]},options:{responsive:true,interaction:{mode:'index',intersect:false},scales:{y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return v+'%'}}},x:{ticks:{color:'#6b7280',maxRotation:45,autoSkip:true,maxTicksLimit:15}}},plugins:{legend:{labels:{color:'#374151'}}}}});

  // ── STEP-LEVEL BARS ──
  var stepCard = document.createElement('div');
  stepCard.className = 'card';
  var h3e = document.createElement('h3');
  h3e.textContent = 'Step-Level Conversion Rates (period avg)';
  var cvs5 = document.createElement('canvas');
  cvs5.id = 'cSteps';
  stepCard.appendChild(h3e);
  stepCard.appendChild(cvs5);
  app.appendChild(stepCard);

  var stepNames = ['Install\u2192FS','FS\u2192OB','OB\u2192Login','Login\u2192Checkout','Checkout\u2192Pay'];
  var stepVals = [
    U.pct(t.fs_shown,t.installs),
    U.pct(t.ob_completed,t.fs_shown),
    U.pct(t.login_users,t.ob_completed),
    U.pct(t.checkout_load,t.login_users),
    U.pct(t.payments,t.checkout_load)
  ];
  charts.steps = new Chart(cvs5, {type:'bar',data:{
    labels:stepNames,
    datasets:[{label:'Conversion %',data:stepVals,backgroundColor:['#ff4d00','#FF7810','#f97316','#22c55e','#ea580c'],borderRadius:6}]
  },options:{responsive:true,scales:{y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return v+'%'}},max:100},x:{ticks:{color:'#374151'}}},plugins:{legend:{display:false}}}});

  // ── CAMPAIGN TABLE ──
  var chColor = {'Google':'#4285f4','Meta':'#0081fb','Ultra':'#0ea5e9','Organic':'#22c55e','Unattributed':'#6b7280','xiaomiglobal':'#ef4444','moloco':'#fbbf24'};
  var tblCard = document.createElement('div');
  tblCard.className = 'card';
  var h3f = document.createElement('h3');
  h3f.textContent = 'Top Campaigns (\u226550 installs)';
  tblCard.appendChild(h3f);

  var tblWrap = document.createElement('div');
  tblWrap.style.overflowX = 'auto';
  var tbl = document.createElement('table');
  var thead = document.createElement('thead');
  var headRow = document.createElement('tr');
  ['Campaign','Channel','Installs','Payments','CVR %','D0 Cancel %'].forEach(function(h) {
    var th = document.createElement('th');
    th.textContent = h;
    if (h !== 'Campaign' && h !== 'Channel') th.style.textAlign = 'right';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  tbl.appendChild(thead);

  var tbody = document.createElement('tbody');
  campaigns.forEach(function(r) {
    var tr = document.createElement('tr');
    var td1 = document.createElement('td');
    td1.textContent = r.campaign;
    td1.style.maxWidth = '300px';
    td1.style.overflow = 'hidden';
    td1.style.textOverflow = 'ellipsis';
    td1.style.whiteSpace = 'nowrap';
    td1.title = r.campaign;

    var td2 = document.createElement('td');
    td2.textContent = r.channel_group;
    td2.style.color = chColor[r.channel_group] || '#6b7280';

    var td3 = document.createElement('td');
    td3.textContent = U.fN(r.installs);
    td3.style.textAlign = 'right';

    var td4 = document.createElement('td');
    td4.textContent = U.fN(r.payments);
    td4.style.textAlign = 'right';

    var td5 = document.createElement('td');
    td5.style.textAlign = 'right';
    var tag = document.createElement('span');
    tag.className = 'tag ' + (r.cvr >= 7 ? 'tag-high' : r.cvr >= 5 ? 'tag-med' : 'tag-low');
    tag.textContent = r.cvr + '%';
    td5.appendChild(tag);

    var td6 = document.createElement('td');
    td6.textContent = r.cancel_rate + '%';
    td6.style.textAlign = 'right';

    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
    tr.appendChild(td4); tr.appendChild(td5); tr.appendChild(td6);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  tblWrap.appendChild(tbl);
  tblCard.appendChild(tblWrap);
  app.appendChild(tblCard);

  // ── DAILY DETAIL TABLE ──
  var detailCard = document.createElement('div');
  detailCard.className = 'card';
  var h3g = document.createElement('h3');
  h3g.textContent = 'Daily Funnel Detail';
  detailCard.appendChild(h3g);

  var detWrap = document.createElement('div');
  detWrap.style.overflowX = 'auto';
  detWrap.style.maxHeight = '400px';
  detWrap.style.overflowY = 'auto';
  var detTbl = document.createElement('table');
  var dHead = document.createElement('thead');
  var dHRow = document.createElement('tr');
  ['Date','Installs','FS Shown','OB Done','Login','Checkout','Orders','Payments','CVR%','Cancels'].forEach(function(h) {
    var th = document.createElement('th');
    th.textContent = h;
    if (h !== 'Date') th.style.textAlign = 'right';
    dHRow.appendChild(th);
  });
  dHead.appendChild(dHRow);
  detTbl.appendChild(dHead);

  var dBody = document.createElement('tbody');
  daily.forEach(function(r) {
    var cvr = r.installs ? (r.payments/r.installs*100).toFixed(2) : '0';
    var tr = document.createElement('tr');
    var vals = [U.shortDate(r.dt), U.fN(r.installs), U.fN(r.fs_shown), U.fN(r.ob_completed), U.fN(r.login_users), U.fN(r.checkout_load), U.fN(r.order_created), U.fN(r.payments), cvr+'%', r.d0_cancellations];
    vals.forEach(function(v, i) {
      var td = document.createElement('td');
      td.textContent = v;
      if (i > 0) td.style.textAlign = 'right';
      tr.appendChild(td);
    });
    dBody.appendChild(tr);
  });
  detTbl.appendChild(dBody);
  detWrap.appendChild(detTbl);
  detailCard.appendChild(detWrap);
  app.appendChild(detailCard);

  // Footer
  var footer = document.createElement('p');
  footer.style.textAlign = 'center';
  footer.style.color = '#9ca3af';
  footer.style.fontSize = '11px';
  footer.style.marginTop = '20px';
  footer.textContent = 'SpeakX D0 Conversion Funnel \u00B7 ' + daily.length + ' days \u00B7 Data excludes partial current day';
  app.appendChild(footer);

}

// ── INITIALIZE WITH LIVE DATA ──
(async function() {
  var DL = window.SPEAKX.DataLoader;
  var F = window.SPEAKX.Filters;
  var liveCount = 0;

  F.setStatus = F.setStatus || function(){};

  // Show loading state
  var cfg = window.SPEAKX.CONFIG;
  if (cfg && cfg.REDASH_USER_API_KEY) {
    window.SPEAKX.Filters.setStatus('Loading live data from Redash...', 'loading');
  }

  // Try to load live data (replaces EMBEDDED_ arrays)
  var live;
  live = await DL.fetchSQL('d0_daily_funnel');
  if (live && live.length) { EMBEDDED_dailyFunnel = live; liveCount++; }

  live = await DL.fetchSQL('d0_channel_funnel');
  if (live && live.length) { EMBEDDED_channelFunnel = live; liveCount++; }

  live = await DL.fetchSQL('d0_weekly_funnel');
  if (live && live.length) { EMBEDDED_weeklyFunnel = live; liveCount++; }

  live = await DL.fetchSQL('d0_campaign_data');
  if (live && live.length) { EMBEDDED_campaignData = live; liveCount++; }

  // Initialize filters
  var channelOptions = [
    {value:'all', text:'All Channels'},
    {value:'Google', text:'Google'},
    {value:'Meta', text:'Meta'},
    {value:'Ultra', text:'Ultra'},
    {value:'Organic', text:'Organic'},
    {value:'Unattributed', text:'Unattributed'},
    {value:'xiaomiglobal', text:'Xiaomi'},
    {value:'moloco', text:'Moloco'}
  ];

  F.init('filters', [
    { type: 'dateRange', key: 'dateRange', label: 'Date Range', defaultDays: 30 },
    { type: 'select', key: 'channel', label: 'Channel', options: channelOptions }
  ], function(state) {
    renderDashboard(state);
  });

  // Initial render
  renderDashboard(F.getState());

  // Set accurate status
  if (liveCount > 0) {
    F.setStatus('Live data from Redash \u00B7 ' + liveCount + '/4 datasets \u00B7 ' + EMBEDDED_dailyFunnel.length + ' days', 'live');
  } else if (cfg && cfg.REDASH_USER_API_KEY) {
    F.setStatus('Failed to load live data \u00B7 Using snapshot', 'error');
  } else {
    F.setStatus('Snapshot data \u00B7 Set REDASH_USER_API_KEY in config.js for live data', 'snapshot');
  }
})();
</script>
