<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#e17055,#fdcb6e,#00b894);padding:32px 40px;border-radius:0 0 20px 20px}
.header h1{font-size:28px;font-weight:700;color:#fff}
.header p{color:rgba(255,255,255,.85);font-size:14px;margin-top:4px}
.container{max-width:1400px;margin:0 auto;padding:24px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.kpi{background:#1a1a2e;border-radius:14px;padding:20px;border:1px solid rgba(225,112,85,.2)}
.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#fdcb6e;margin-bottom:6px}
.kpi .value{font-size:26px;font-weight:700;color:#fff}
.kpi .delta{font-size:12px;margin-top:4px}
.kpi .delta.up{color:#00b894}.kpi .delta.down{color:#ff6b6b}
.card{background:#1a1a2e;border-radius:14px;padding:24px;margin-bottom:24px;border:1px solid rgba(225,112,85,.15)}
.card h3{font-size:16px;font-weight:600;color:#fdcb6e;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid #e17055;color:#fdcb6e;font-weight:600;font-size:11px;text-transform:uppercase}
td{padding:9px 12px;border-bottom:1px solid rgba(225,112,85,.1)}
tr:hover td{background:rgba(225,112,85,.08)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-high{background:rgba(0,184,148,.15);color:#00b894}
.tag-med{background:rgba(253,203,110,.15);color:#fdcb6e}
.tag-low{background:rgba(255,107,107,.15);color:#ff6b6b}
canvas{max-height:320px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
