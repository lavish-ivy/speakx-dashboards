<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakX · Marketing Performance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff7ed;color:#111827;min-height:100vh}
.header{background:linear-gradient(135deg,#ff4d00,#FF7810);padding:32px 40px;border-radius:0 0 20px 20px}
.header h1{font-size:28px;font-weight:700;color:#fff}
.header p{color:rgba(255,255,255,.9);font-size:14px;margin-top:4px}
.container{max-width:1400px;margin:0 auto;padding:24px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.kpi{background:#fff;border-radius:14px;padding:20px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#ea580c;margin-bottom:6px;font-weight:600}
.kpi .value{font-size:26px;font-weight:700;color:#111827}
.kpi .delta{font-size:12px;margin-top:4px}
.kpi .delta.up{color:#16a34a}.kpi .delta.down{color:#dc2626}
.card{background:#fff;border-radius:14px;padding:24px;margin-bottom:24px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card h3{font-size:16px;font-weight:600;color:#111827;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid #ff4d00;color:#ea580c;font-weight:600;font-size:11px;text-transform:uppercase}
td{padding:9px 12px;border-bottom:1px solid #f3f4f6;color:#374151}
tr:hover td{background:rgba(255,120,16,.04)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-high{background:rgba(34,197,94,.1);color:#16a34a}
.tag-med{background:rgba(249,115,22,.1);color:#ea580c}
.tag-low{background:rgba(239,68,68,.1);color:#dc2626}
canvas{max-height:320px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>

// ═══ HELPERS ═══
var U = window.SPEAKX.Utils;
var FD = window.SPEAKX.FilterData;
var charts = {};
var langNames = {hi:'Hindi',mr:'Marathi',ta:'Tamil',te:'Telugu',kn:'Kannada',bn:'Bengali',or:'Odia',gu:'Gujarati',ur:'Urdu',ml:'Malayalam',pa:'Punjabi',ne:'Nepali'};
var chColors = {Google:'#4285f4',Meta:'#0081fb',Organic:'#22c55e','Other Paid':'#f97316'};
var channels = ['Google','Meta','Organic','Other Paid'];

// ═══ RENDER DASHBOARD ═══
function renderDashboard(filters) {
    // Filter daily data by date range
    var dailyChannel = FD.byDateRange(EMBEDDED_dailyChannel, 'dt', filters.dateRange);
    var revenueDaily = FD.byDateRange(EMBEDDED_revenueDaily, 'dt', filters.dateRange);
    // Filter by channel
    if (filters.channel && filters.channel !== 'all') {
        dailyChannel = dailyChannel.filter(function(r) { return r.channel_group === filters.channel; });
    }
    var weeklyChannel = EMBEDDED_weeklyChannel;
    var langData = EMBEDDED_langData;

    // Destroy charts
    Object.keys(charts).forEach(function(k) { charts[k] = U.destroyChart(charts[k]); });

    // Pivot helpers
    var dates = [];
    var seen = {};
    dailyChannel.forEach(function(r) { if (!seen[r.dt]) { seen[r.dt] = true; dates.push(r.dt); } });
    var activeChannels = filters.channel && filters.channel !== 'all' ? [filters.channel] : channels;
    var pivot = function(ch, field) {
        return dates.map(function(d) {
            var r = dailyChannel.find(function(x) { return x.dt === d && x.channel_group === ch; });
            return r ? r[field] : 0;
        });
    };

    // Aggregate KPIs
    var totCh = {};
    activeChannels.forEach(function(c) {
        totCh[c] = {installs:0, payments:0};
        dailyChannel.filter(function(r) { return r.channel_group === c; }).forEach(function(r) {
            totCh[c].installs += r.installs;
            totCh[c].payments += r.payments;
        });
    });
    var totInst = Object.values(totCh).reduce(function(a, v) { return a + v.installs; }, 0);
    var totPay = Object.values(totCh).reduce(function(a, v) { return a + v.payments; }, 0);
    var totRev = revenueDaily.reduce(function(a, r) { return a + r.trial_revenue + r.monthly_revenue; }, 0);
    var totTrial = revenueDaily.reduce(function(a, r) { return a + r.trial_revenue; }, 0);
    var l7rev = revenueDaily.slice(-7).reduce(function(a, r) { return a + r.trial_revenue + r.monthly_revenue; }, 0);
    var p7rev = revenueDaily.slice(-14, -7).reduce(function(a, r) { return a + r.trial_revenue + r.monthly_revenue; }, 0);
    var revD = p7rev ? ((l7rev - p7rev) / p7rev * 100).toFixed(1) : 0;

    // Build DOM
    var app = document.getElementById('app');
    app.textContent = '';

    // ── KPIs ──
    var kpiRow = document.createElement('div');
    kpiRow.className = 'kpi-row';
    var kpiData = [
        {l:'Period Installs', v:U.fN(totInst)},
        {l:'Period Payments', v:U.fN(totPay)},
        {l:'Period Revenue', v:'\u20B9' + U.fN(totRev)},
        {l:'7-Day Revenue', v:'\u20B9' + U.fN(l7rev), d:revD}
    ];
    // Add per-channel CVRs (only if showing all channels)
    if (!filters.channel || filters.channel === 'all') {
        activeChannels.forEach(function(c) {
            if (totCh[c] && totCh[c].installs > 0) {
                kpiData.push({l:c + ' CVR', v:(totCh[c].payments / totCh[c].installs * 100).toFixed(1) + '%'});
            }
        });
    } else {
        var ch = totCh[filters.channel];
        if (ch && ch.installs > 0) {
            kpiData.push({l:filters.channel + ' CVR', v:(ch.payments / ch.installs * 100).toFixed(1) + '%'});
        }
    }
    kpiData.push({l:'Trial Revenue Share', v:totRev > 0 ? (totTrial / totRev * 100).toFixed(1) + '%' : '0%'});

    kpiData.forEach(function(k) {
        var div = document.createElement('div'); div.className = 'kpi';
        var lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = k.l;
        var val = document.createElement('div'); val.className = 'value'; val.textContent = k.v;
        div.appendChild(lbl); div.appendChild(val);
        if (k.d) {
            var delt = document.createElement('div');
            delt.className = 'delta ' + (k.d >= 0 ? 'up' : 'down');
            delt.textContent = (k.d >= 0 ? '\u25B2' : '\u25BC') + ' ' + Math.abs(k.d) + '% WoW';
            div.appendChild(delt);
        }
        kpiRow.appendChild(div);
    });
    app.appendChild(kpiRow);

    // ── Chart Row 1: Daily Installs + Daily Revenue ──
    var grid1 = document.createElement('div'); grid1.className = 'grid-2';
    var card1 = document.createElement('div'); card1.className = 'card';
    var h1 = document.createElement('h3'); h1.textContent = 'Daily Installs by Channel';
    var cvs1 = document.createElement('canvas');
    card1.appendChild(h1); card1.appendChild(cvs1);

    var card2 = document.createElement('div'); card2.className = 'card';
    var h2 = document.createElement('h3'); h2.textContent = 'Daily Revenue (Trial + Monthly)';
    var cvs2 = document.createElement('canvas');
    card2.appendChild(h2); card2.appendChild(cvs2);
    grid1.appendChild(card1); grid1.appendChild(card2);
    app.appendChild(grid1);

    charts.c1 = new Chart(cvs1, {type:'bar', data:{
        labels:dates.map(U.shortDate),
        datasets:activeChannels.map(function(c) { return {label:c, data:pivot(c,'installs'), backgroundColor:(chColors[c]||'#6b7280')+'cc'}; })
    }, options:{responsive:true, animation:false, scales:{x:{stacked:true,ticks:{color:'#6b7280',maxRotation:45,autoSkip:true,maxTicksLimit:15}},y:{stacked:true,grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return U.fN(v)}}}},plugins:{legend:{labels:{color:'#374151'}}}}});

    charts.c2 = new Chart(cvs2, {type:'bar', data:{
        labels:revenueDaily.map(function(r) { return U.shortDate(r.dt); }),
        datasets:[
            {label:'Trial \u20B9', data:revenueDaily.map(function(r) { return r.trial_revenue; }), backgroundColor:'#f97316cc'},
            {label:'Monthly \u20B9', data:revenueDaily.map(function(r) { return r.monthly_revenue; }), backgroundColor:'#22c55ecc'}
        ]
    }, options:{responsive:true, animation:false, scales:{x:{stacked:true,ticks:{color:'#6b7280',maxRotation:45,autoSkip:true,maxTicksLimit:15}},y:{stacked:true,grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return '\u20B9'+U.fN(v)}}}},plugins:{legend:{labels:{color:'#374151'}}}}});

    // ── Chart Row 2: Weekly CVR + Language Doughnut ──
    var grid2 = document.createElement('div'); grid2.className = 'grid-2';
    var card3 = document.createElement('div'); card3.className = 'card';
    var h3 = document.createElement('h3'); h3.textContent = 'Weekly CVR by Channel (12 weeks)';
    var cvs3 = document.createElement('canvas');
    card3.appendChild(h3); card3.appendChild(cvs3);

    var card4 = document.createElement('div'); card4.className = 'card';
    var h4 = document.createElement('h3'); h4.textContent = 'Install Mix by Language (30 days)';
    var cvs4 = document.createElement('canvas');
    card4.appendChild(h4); card4.appendChild(cvs4);
    grid2.appendChild(card3); grid2.appendChild(card4);
    app.appendChild(grid2);

    var weeks = [];
    var wSeen = {};
    weeklyChannel.forEach(function(r) { if (!wSeen[r.week_start]) { wSeen[r.week_start] = true; weeks.push(r.week_start); } });
    var wPivot = function(ch) {
        return weeks.map(function(w) {
            var r = weeklyChannel.find(function(x) { return x.week_start === w && x.channel_group === ch; });
            return r ? r.cvr : 0;
        });
    };

    charts.c3 = new Chart(cvs3, {type:'line', data:{
        labels:weeks.map(U.shortDate),
        datasets:channels.map(function(c) { return {label:c, data:wPivot(c), borderColor:chColors[c], tension:.3, pointRadius:3}; })
    }, options:{responsive:true, animation:false, interaction:{mode:'index',intersect:false}, scales:{y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return v+'%'}}},x:{ticks:{color:'#6b7280'}}},plugins:{legend:{labels:{color:'#374151'}}}}});

    var langFiltered = langData.filter(function(r) { return r.installs > 5000; });
    charts.c4 = new Chart(cvs4, {type:'doughnut', data:{
        labels:langFiltered.map(function(r) { return langNames[r.lang] || r.lang; }),
        datasets:[{data:langFiltered.map(function(r) { return r.installs; }), backgroundColor:['#ff4d00','#FF7810','#f97316','#3b82f6','#0ea5e9','#ea580c','#22c55e','#6b7280','#ef4444','#d1d5db']}]
    }, options:{responsive:true, animation:false, plugins:{legend:{position:'right',labels:{color:'#374151',font:{size:11}}}}}});

    // ── Chart 3: Language CVR ──
    var langCard = document.createElement('div'); langCard.className = 'card';
    var h5 = document.createElement('h3'); h5.textContent = 'Conversion Rate by Language (30 days, \u22655K installs)';
    var cvs5 = document.createElement('canvas');
    langCard.appendChild(h5); langCard.appendChild(cvs5);
    app.appendChild(langCard);

    charts.c5 = new Chart(cvs5, {type:'bar', data:{
        labels:langFiltered.map(function(r) { return langNames[r.lang] || r.lang; }),
        datasets:[{label:'CVR %', data:langFiltered.map(function(r) { return r.cvr; }), backgroundColor:langFiltered.map(function(r) { return r.cvr >= 8 ? '#22c55ecc' : r.cvr >= 5 ? '#f97316cc' : '#ef4444cc'; }), borderRadius:6}]
    }, options:{responsive:true, animation:false, scales:{y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return v+'%'}}},x:{ticks:{color:'#374151'}}},plugins:{legend:{display:false}}}});

    // ── Chart 4: Weekly Install Volume ──
    var wInstCard = document.createElement('div'); wInstCard.className = 'card';
    var h6 = document.createElement('h3'); h6.textContent = 'Weekly Install Volume by Channel (12 weeks)';
    var cvs6 = document.createElement('canvas');
    wInstCard.appendChild(h6); wInstCard.appendChild(cvs6);
    app.appendChild(wInstCard);

    var wInstalls = function(ch) {
        return weeks.map(function(w) {
            var r = weeklyChannel.find(function(x) { return x.week_start === w && x.channel_group === ch; });
            return r ? r.installs : 0;
        });
    };
    charts.c6 = new Chart(cvs6, {type:'bar', data:{
        labels:weeks.map(U.shortDate),
        datasets:channels.map(function(c) { return {label:c, data:wInstalls(c), backgroundColor:(chColors[c]||'#6b7280')+'cc'}; })
    }, options:{responsive:true, animation:false, scales:{x:{stacked:true,ticks:{color:'#6b7280'}},y:{stacked:true,grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#6b7280',callback:function(v){return U.fN(v)}}}},plugins:{legend:{labels:{color:'#374151'}}}}});

    // ── Language Table ──
    var tblCard = document.createElement('div'); tblCard.className = 'card';
    var h7 = document.createElement('h3'); h7.textContent = 'Language Performance (30 days)';
    tblCard.appendChild(h7);
    var tblWrap = document.createElement('div'); tblWrap.style.overflowX = 'auto';
    var tbl = document.createElement('table');
    var thead = document.createElement('thead');
    var hrow = document.createElement('tr');
    ['Language','Installs','Payments','CVR %','Share of Installs'].forEach(function(h) {
        var th = document.createElement('th'); th.textContent = h;
        if (h !== 'Language') th.style.textAlign = 'right';
        hrow.appendChild(th);
    });
    thead.appendChild(hrow); tbl.appendChild(thead);
    var tbody = document.createElement('tbody');
    langData.forEach(function(r) {
        var share = totInst > 0 ? (r.installs / totInst * 100).toFixed(1) : '0';
        var tr = document.createElement('tr');
        var td1 = document.createElement('td'); td1.textContent = langNames[r.lang] || r.lang;
        var td2 = document.createElement('td'); td2.textContent = U.fN(r.installs); td2.style.textAlign = 'right';
        var td3 = document.createElement('td'); td3.textContent = U.fN(r.payments); td3.style.textAlign = 'right';
        var td4 = document.createElement('td'); td4.style.textAlign = 'right';
        var tag = document.createElement('span');
        tag.className = 'tag ' + (r.cvr >= 8 ? 'tag-high' : r.cvr >= 5 ? 'tag-med' : 'tag-low');
        tag.textContent = r.cvr + '%';
        td4.appendChild(tag);
        var td5 = document.createElement('td'); td5.textContent = share + '%'; td5.style.textAlign = 'right';
        tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3); tr.appendChild(td4); tr.appendChild(td5);
        tbody.appendChild(tr);
    });
    tbl.appendChild(tbody); tblWrap.appendChild(tbl); tblCard.appendChild(tblWrap);
    app.appendChild(tblCard);

    // Footer
    var footer = document.createElement('p');
    footer.style.textAlign = 'center'; footer.style.color = '#9ca3af';
    footer.style.fontSize = '11px'; footer.style.marginTop = '20px';
    footer.textContent = 'SpeakX Marketing Performance \xB7 ' + dates.length + ' days \xB7 Data excludes partial current day';
    app.appendChild(footer);

}


// ═══ INITIALIZE WITH LIVE DATA ═══
(async function() {
    var DL = window.SPEAKX.DataLoader;
    var F  = window.SPEAKX.Filters;
    var cfg = window.SPEAKX.CONFIG;
    var liveCount = 0;

    F.setStatus('Loading live data...', 'loading');

    // Load all 4 datasets in parallel
    try {
      var data = await DL.fetchAllSQL([
        'mkt_daily_channel', 'mkt_revenue_daily', 'mkt_weekly_channel', 'mkt_lang_data'
      ]);
      if (data.mkt_daily_channel && data.mkt_daily_channel.length) { EMBEDDED_dailyChannel = data.mkt_daily_channel; liveCount++; }
      if (data.mkt_revenue_daily && data.mkt_revenue_daily.length) { EMBEDDED_revenueDaily = data.mkt_revenue_daily; liveCount++; }
      if (data.mkt_weekly_channel && data.mkt_weekly_channel.length) { EMBEDDED_weeklyChannel = data.mkt_weekly_channel; liveCount++; }
      if (data.mkt_lang_data && data.mkt_lang_data.length) { EMBEDDED_langData = data.mkt_lang_data; liveCount++; }
    } catch (err) {
      console.warn('[MKT] Error loading live data:', err.message);
    }

    // Initialize filters
    F.init('filters', [
        { type: 'dateRange', key: 'dateRange', label: 'Date Range', defaultDays: 30 },
        { type: 'select', key: 'channel', label: 'Channel', options: [
            {value:'all', text:'All Channels'},
            {value:'Google', text:'Google'},
            {value:'Meta', text:'Meta'},
            {value:'Organic', text:'Organic'},
            {value:'Other Paid', text:'Other Paid'}
        ]}
    ], function(state) { renderDashboard(state); });

    renderDashboard(F.getState());

    // Set accurate status
    if (liveCount > 0) {
        F.setStatus('Live data from Redash \xB7 ' + liveCount + '/4 datasets', 'live');
    } else if (cfg && cfg.REDASH_USER_API_KEY) {
        F.setStatus('Failed to load live data \xB7 Using snapshot', 'error');
    } else {
        F.setStatus('Snapshot data \xB7 Set REDASH_USER_API_KEY in config.js for live data', 'snapshot');
    }
})();
</script>
